name: CI Workflow

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - 'main'

jobs:
  ci_job:
    name: CI job
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requiremts-pyspark.txt

      - name: Run pytest @generate HTML report
        run: |
          pytest\
           --disable-warnings\
           --cov=src\
           --cov-report =xml
      - name: Upload Coverage HTM report 
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: htmlcov
       

   
        
