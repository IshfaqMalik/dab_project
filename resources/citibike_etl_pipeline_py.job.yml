resources:
  jobs:
    citibike_etl_pipeline_py:
      name: citibike_etl_pipeline_py
      tasks:
        - task_key: 01_bronze_citibike
          spark_python_task:
            python_file: ../citibike_etl/scripts/bronze/01_bronzr_table.py
            parameters:
              - "{{job.id}}"
              - "{{job.run_id}}"
              - "{{task.run_id}}"
              - "{{job.start_time.iso_datetime}}"
              - "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
          libraries:
            - whl: ../dist/*.whl
        - task_key: 02_silver_citibike
          depends_on:
            - task_key: 01_bronze_citibike
          spark_python_task:
            python_file: ../citibike_etl/scripts/silver/02_silver_table.py
            parameters:
              - "{{job.id}}"
              - "{{job.run_id}}"
              - "{{task.run_id}}"
              - "{{job.start_time.iso_datetime}}"
              - "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
        - task_key: 03_gold_citibike_summary
          depends_on:
            - task_key: 02_silver_citibike
          spark_python_task:
            python_file: ../citibike_etl/scripts/gold/03_gold_city_bikes_dailysummary.py
            parameters:
              - "${var.catalog}"

            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
        - task_key: 04_gold_citibike_daily
          depends_on:
            - task_key: 02_silver_citibike
          spark_python_task:
            python_file: ../citibike_etl/scripts/gold/04_gold_daily_statation_performance.py
            parameters:
              - "${var.catalog}"
              
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
      job_clusters:
        - job_cluster_key: ds3_v2_sn
          new_cluster: "${var.ds3_v2_sn}"

            
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED