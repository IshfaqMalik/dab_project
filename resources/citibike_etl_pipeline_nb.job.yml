resources:
  jobs:
    citibike_etl_pipeline_job:
      name: citibike_etl_pipeline_job
      tasks:
        - task_key: 00_whl_upload
          python_wheel_task:
            package_name: dab_project
            entry_point: main
          job_cluster_key: ds3_v2_sn
          libraries:
            - whl: ../dist/dab_project-0.0.1-py3-none-any.whl
        - task_key: 01_bronze_citibike
          depends_on:
            - task_key: 00_whl_upload
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/bronze/01_bronze_notebook.ipynb
            base_parameters:
              pipeline_id: "{{job.id}}"
              run_id: "{{job.run_id}}"
              task_id: "{{task.run_id}}"
              processed_timestamp: "{{job.start_time.iso_datetime}}"
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
         
        - task_key: 02_silver_citibike
          depends_on:
            - task_key: 01_bronze_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/silver/02_silver_notebook.ipynb
            base_parameters:
              pipeline_id: "{{job.id}}"
              run_id: "{{job.run_id}}"
              task_id: "{{task.run_id}}"
              processed_timestamp: "{{job.start_time.iso_datetime}}"
              catalog: "${var.catalog}"
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
        - task_key: 03_gold_citibike_summary
          depends_on:
            - task_key: 02_silver_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/gold/03_gold_citibikes_daily_summary.ipynb
            base_parameters:
              catalog: "${var.catalog}"

            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
        - task_key: 04_gold_citibike_daily
          depends_on:
            - task_key: 02_silver_citibike
          notebook_task:
            notebook_path: ../citibike_etl/notebooks/gold/04_gold_daily_station_performance.ipynb
            base_parameters:
              catalog: "${var.catalog}"
              
            source: WORKSPACE
          job_cluster_key: ds3_v2_sn
      job_clusters:
        - job_cluster_key: ds3_v2_sn
          new_cluster: "${var.ds3_v2_sn}"

            
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED